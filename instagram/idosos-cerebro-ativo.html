<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idosos - Cérebro Ativo - Ginástica do Cérebro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&family=Nunito:wght@700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @font-face {
            font-family: 'ClashDisplay';
            src: url('../assets/font/clash/WEB/fonts/ClashDisplay-Bold.woff2') format('woff2'),
                url('../assets/font/clash/WEB/fonts/ClashDisplay-Bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
        }

        @font-face {
            font-family: 'ClashDisplay';
            src: url('../assets/font/clash/WEB/fonts/ClashDisplay-Semibold.woff2') format('woff2'),
                url('../assets/font/clash/WEB/fonts/ClashDisplay-Semibold.woff') format('woff');
            font-weight: 600;
            font-style: normal;
        }

        @font-face {
            font-family: 'ClashDisplay';
            src: url('../assets/font/clash/WEB/fonts/ClashDisplay-Medium.woff2') format('woff2'),
                url('../assets/font/clash/WEB/fonts/ClashDisplay-Medium.woff') format('woff');
            font-weight: 500;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a1a1a;
            gap: 24px;
            padding: 40px;
        }

        .download-btn {
            background: #FF8340;
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .download-btn:hover {
            background: #e06b28;
            transform: translateY(-2px);
        }

        /* Card 1080x1320 vertical */
        .card {
            width: 1080px;
            height: 1320px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Imagem de fundo - idoso engajado, mãos em movimento, jogo */
        .bg-image {
            position: absolute;
            inset: 0;
            background:
                url('https://images.unsplash.com/photo-1442458370899-ae20e367c5d8?w=1400&q=80') center 30% / cover no-repeat;
            z-index: 1;
        }

        /* Overlay gradiente verde escuro — respiro no topo, forte embaixo */
        .overlay {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg,
                    rgba(0, 62, 41, 0.1) 0%,
                    rgba(0, 62, 41, 0.05) 20%,
                    rgba(0, 62, 41, 0.35) 50%,
                    rgba(0, 62, 41, 0.85) 72%,
                    rgba(0, 62, 41, 0.97) 100%);
            z-index: 2;
        }

        /* ===== LOGO SVG topo direito ===== */
        .logo {
            position: absolute;
            top: 44px;
            right: 50px;
            z-index: 20;
        }

        /* ===== Aspas decorativas ===== */
        .quote-mark {
            position: absolute;
            top: 38px;
            left: 50px;
            z-index: 20;
            font-family: 'ClashDisplay', sans-serif;
            font-size: 68px;
            font-weight: 700;
            color: #FBBD1E;
            line-height: 1;
        }

        /* ===== Texto de apoio topo esquerdo ===== */
        .support-text {
            position: absolute;
            top: 125px;
            left: 50px;
            z-index: 20;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            text-transform: uppercase;
            line-height: 1.6;
            letter-spacing: 1.5px;
            max-width: 400px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }

        .support-text .highlight {
            color: #FBBD1E;
        }

        /* ===== TÍTULO PRINCIPAL - Tarjas orgânicas ===== */
        .title-block {
            position: absolute;
            bottom: 290px;
            left: 0;
            right: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding-left: 50px;
            gap: 4px;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-line {
            display: inline-block;
            padding: 10px 28px;
            transform-origin: left center;
        }

        /* "Cérebro" — laranja, grande, impacto */
        .title-line-1 {
            background: #FF8340;
            transform: rotate(-1deg);
            border-radius: 2px;
            padding: 12px 38px;
        }

        .title-line-1 span {
            font-family: 'ClashDisplay', sans-serif;
            font-weight: 700;
            font-size: 100px;
            color: #fff;
            line-height: 1;
            letter-spacing: -2px;
            text-transform: lowercase;
        }

        /* "parado" — amarelo */
        .title-line-2 {
            background: #FBBD1E;
            transform: rotate(0.8deg);
            margin-left: 60px;
            border-radius: 2px;
            padding: 10px 32px;
        }

        .title-line-2 span {
            font-family: 'ClashDisplay', sans-serif;
            font-weight: 600;
            font-size: 72px;
            color: #003E29;
            line-height: 1;
            letter-spacing: -1px;
            text-transform: lowercase;
        }

        /* "também" — verde escuro, menor */
        .title-line-3 {
            background: #003E29;
            transform: rotate(-0.5deg);
            margin-left: 20px;
            border-radius: 2px;
            padding: 8px 24px;
            border: 1.5px solid rgba(172, 228, 227, 0.25);
        }

        .title-line-3 span {
            font-family: 'ClashDisplay', sans-serif;
            font-weight: 500;
            font-size: 44px;
            color: #ACE4E3;
            line-height: 1;
            letter-spacing: 3px;
            text-transform: lowercase;
        }

        /* "enfraquece." — branco solto, sem fundo */
        .title-line-4 {
            margin-left: 24px;
            margin-top: 2px;
        }

        .title-line-4 span {
            font-family: 'ClashDisplay', sans-serif;
            font-weight: 700;
            font-size: 58px;
            color: #fff;
            line-height: 1;
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        /* ===== Texto corpo inferior ===== */
        .body-text {
            position: absolute;
            bottom: 130px;
            left: 50px;
            right: 50px;
            z-index: 20;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 21px;
            color: rgba(255, 255, 255, 0.78);
            line-height: 1.75;
            max-width: 680px;
        }

        .body-text strong {
            color: #FBBD1E;
            font-weight: 800;
        }

        /* ===== Barra WhatsApp ===== */
        .whatsapp-bar {
            position: absolute;
            bottom: 44px;
            left: 50px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #003E29;
            border: 1.5px solid rgba(172, 228, 227, 0.2);
            padding: 12px 24px;
            border-radius: 50px;
        }

        .wpp-icon {
            width: 30px;
            height: 30px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wpp-icon svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }

        .wpp-number {
            font-family: 'Nunito Sans', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        /* ===== Handle ===== */
        .handle {
            position: absolute;
            bottom: 52px;
            right: 50px;
            z-index: 20;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
        }

        /* ===== Detalhe decorativo — círculo sutil ===== */
        .deco-circle {
            position: absolute;
            top: 180px;
            right: -60px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 2px solid rgba(251, 189, 30, 0.15);
            z-index: 3;
        }

        .deco-circle-2 {
            position: absolute;
            bottom: 400px;
            right: 60px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 131, 64, 0.06);
            z-index: 3;
        }
    </style>
</head>

<body>

                    fill="url(#d)" />
                <path
                    d="M359.07,1604.6c24.55-.89,158.5,54.42,202.45,64.92,155.76,37.21,306.04,47.04,462.42,6.47,57.15-14.83,237.24-127.79,236.59-36.23-.44,61.58-151.82,109.95-205.02,124.42-170.43,46.36-563.47,32.67-712.57-68.52-46.46-31.53-31.34-89.33,16.13-91.06Z"
                    fill="url(#e)" />
            </svg>
        </div>

        <!-- Aspas -->
        <div class="quote-mark">❝</div>

        <!-- Texto de apoio topo -->
        <div class="support-text">
            Ginástica do Cérebro<br>
            <span class="highlight">+60 anos</span>
        </div>

        <!-- Título com tarjas orgânicas -->
        <div class="title-block">
            <div class="title-line title-line-1">
                <span>cérebro</span>
            </div>
            <div class="title-line title-line-2">
                <span>parado</span>
            </div>
            <div class="title-row">
                <div class="title-line title-line-3">
                    <span>também</span>
                </div>
                <div class="title-line-4">
                    <span>enfraquece.</span>
                </div>
            </div>
        </div>

        <!-- Texto corpo -->
        <div class="body-text">
            Assim como o corpo, a mente precisa de treino, desafio e convivência para continuar ativa.
            <strong>Memória, atenção e raciocínio precisam de uso.</strong>
        </div>

        <!-- WhatsApp -->
        <div class="whatsapp-bar">
            <div class="wpp-icon">
                <svg viewBox="0 0 24 24">

                    <path
                        d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492l4.625-1.476A11.929 11.929 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818c-2.168 0-4.19-.587-5.932-1.61l-.425-.253-2.742.876.876-2.688-.278-.442A9.776 9.776 0 012.182 12c0-5.418 4.4-9.818 9.818-9.818 5.418 0 9.818 4.4 9.818 9.818 0 5.418-4.4 9.818-9.818 9.818z" />
                </svg>
            </div>
            <span class="wpp-number">(65) 99326-7171</span>
        </div>

        <!-- Handle -->
        <div class="handle">@gccuiaba.alvorada</div>
    </div>

    <script>
        function downloadPNG() {
            const card = document.getElementById('card');
            html2canvas(card, {
                width: 1080,
                height: 1320,
                scale: 1,
                useCORS: true,
                allowTaint: true,
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'idoso-study.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>

</html>
